name: CI/CD Pipeline

on:
  push:
    branches:
      - production

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase Owner Name
        id: owner
        run: |
          echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/yawgriva-backend:latest
            ghcr.io/${{ steps.owner.outputs.owner }}/yawgriva-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/yawgriva-frontend:latest
            ghcr.io/${{ steps.owner.outputs.owner }}/yawgriva-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Downcase Owner Name
        id: owner
        run: |
          echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "docker-compose.prod.yml"
          target: "~/yawgriva"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Navigate to directory
            mkdir -p ~/yawgriva
            cd ~/yawgriva

            # Rename copied compose file to docker-compose.yml
            if [ -f docker-compose.prod.yml ]; then
              mv docker-compose.prod.yml docker-compose.yml
            fi

            # Set environment variables for docker compose
            echo "IMAGE_OWNER=${{ steps.owner.outputs.owner }}" > .env.production
            
            # Combine it with existing .env if present
            if [ -f .env ]; then
              # Make sure .env doesn't contain duplicate IMAGE_OWNER
              grep -v '^IMAGE_OWNER=' .env > .env.tmp || true
              mv .env.tmp .env
            fi
            cat .env.production >> .env
            rm -f .env.production

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose pull

            # Start containers
            docker compose up -d --remove-orphans

            # Clean up old unused images
            docker image prune -f
