version: "3.9"

services:
  frontend:
    image: ghcr.io/${IMAGE_OWNER}/yawgriva-frontend:latest
    ports:
      - "3010:3000"
    environment:
      - NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
      - API_URL=$API_URL
    depends_on:
      - backend
    restart: always

  backend:
    image: ghcr.io/${IMAGE_OWNER}/yawgriva-backend:latest
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - static_data:/app/static
    restart: always

  celery_worker:
    image: ghcr.io/${IMAGE_OWNER}/yawgriva-backend:latest
    command: celery -A workers.celery_app worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - .env
    restart: always

  celery_beat:
    image: ghcr.io/${IMAGE_OWNER}/yawgriva-backend:latest
    command: celery -A workers.celery_app beat --loglevel=info
    depends_on:
      cache:
        condition: service_healthy
    env_file:
      - .env
    restart: always

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-yawgriva}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yawgriva_secret}
      POSTGRES_DB: ${POSTGRES_DB:-yawgriva}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Private to docker network for security in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yawgriva}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  cache:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    # Private to docker network for security in production
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  minio:
    image: minio/minio:RELEASE.2024-01-28T22-35-53Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadminpassword}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres_data:
  redis_data:
  minio_data:
  static_data:
